name: Backup Drill (mensal)

on:
  schedule:
    # Dia 1 de cada mês, 06:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo da execução manual'
        required: false
        default: 'drill manual'

jobs:
  backup-drill:
    name: Restore Drill
    runs-on: ubuntu-latest

    env:
      BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
      BACKUP_AGE_IDENTITY: ${{ secrets.BACKUP_AGE_IDENTITY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install age (criptografia de backups)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y age

      - name: Setup AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}

      - name: Setup PostgreSQL 16 client
        run: |
          sudo apt-get install -y postgresql-client-16 || \
          sudo apt-get install -y postgresql-client

      - name: Run restore drill
        id: drill
        run: |
          mkdir -p drill-output
          bash scripts/ops/restore-drill.sh 2>&1 | tee drill-output/drill.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload drill output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drill-output
          path: drill-output/
          retention-days: 90

      - name: Criar issue em caso de falha
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: '[ALERTA] Backup drill falhou — ${{ github.run_id }}'
          content-filepath: drill-output/drill.log
          labels: |
            backup
            on-call
            automated
